<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매장그룹검색</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 매장그룹검색 팝업 ========== -->
    <div class="layer-wrap" id="popup-sample-lg" style="display: block;">
        <div class="layer-pop">
            <div class="layer-inner layer-lg">
                <div class="layer-head with-btn">
                    <h4 class="layer-title">매장 정보 검색</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="searchbar-wrap">
                            <div class="input-group select row nowrap">
                                <select class="w160">
                                    <option value="">그룹구분</option>
                                    <option value="">Cookie</option>
                                </select>
                                <div class="input-group search w160">
                                    <input type="text" class="input-md" placeholder="사용자 ID">
                                </div>
                                <div class="input-group search">
                                    <input type="text" class="input-md" placeholder="매장코드">
                                </div>
                            </div>
                            <button class="btn btn-md btn-neutral refresh"><i class="ico_refresh"></i></button>
                        </div>
                        <div class="table-container">
                            <table class="table-basic size-md table-fixed2 table-selectable">
                                <colgroup>
                                    <!-- <col width="10%">
                                    <col width="30%">
                                    <col width="5%">
                                    <col width="5%">
                                    <col width="5%">
                                    <col width="10%">
                                    <col width="10%">
                                    <col width="10%">  -->
                                </colgroup>
    
                                <thead>
                                    <tr>
                                        <th class="fixedHeader">매장그룹</th>
                                        <th class="fixedHeader">그룹명</th>
                                        <th class="fixedHeader">그룹구분</th>
                                        <th class="fixedHeader">사용자명</th>
                                        <th class="fixedHeader">등록건수</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>TA 일부</td>
                                        <td>TA 일부</td>
                                        <td>0 (공통)</td>
                                        <td></td>
                                        <td>19</td>
                                    </tr>
                                    <tr>
                                        <td>TA 일부</td>
                                        <td>TA 일부</td>
                                        <td>0 (공통)</td>
                                        <td></td>
                                        <td>19</td>
                                    </tr>
                                    
                                </tbody>
                            </table>
                        </div>

                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button" class="btn btn-md btn-text ui-close-pop"><span>취소</span></button>
                            <button type="button" class="btn btn-md btn-primary ui-close-pop"><span>적용하기</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->



    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>



</body>

</html>
