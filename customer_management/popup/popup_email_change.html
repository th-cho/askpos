<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 이메일 변경</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 이메일 변경 팝업 ========== -->
    <div class="layer-wrap" id="popup-sample-sm" style="display: block;;">
        <div class="layer-pop">
            <div class="layer-inner layer-md">
                <div class="layer-head">
                    <h4 class="layer-title">고객 이메일 변경</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="input-group-wrap col">
                            <div class="input-email2">
                                <div class="email_before">
                                    <p class="label-text">변경 전 이메일</p>
                                    <div class="email_before_inner">
                                        <input type="email" class="input-md" value="abc111">
                                        <span>@</span>
                                        <input type="text" class="input-md" value="naver.com">
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                        <div class="input-group-wrap col">
                            <div class="input-email2">
                                <div class="email_before">
                                    <p class="label-text">변경 후 이메일</p>
                                    <div class="email-row">
                                        <div class="email_before_inner">
                                            <input type="email" class="input-md">
                                            <span>@</span>
                                            <input type="text" class="input-md" id="domain-txt">
                                        </div>
                                        <div class="input-group select">
                                            <select id="domain-list">
                                                <option value="type">직적입력</option>
                                                <option value="naver.com">Naver</option>
                                                <option value="gmail.com">Google</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button class="btn btn-md btn-tonal w100">중복확인</button>
                        </div>
                       
                        <div class="input-group-wrap">
                            <div class="input-group">
                                <label for="datepicker-input" class="input-group-label">요청일자</label>
                                <div class="input-datepicker-wrap">
                                    <div class="tui-datepicker-input tui-datetime-input">
                                        <input type="text" id="datepicker-input" class="input-md">
                                    </div>
                                    <div id="tui-date-wrap" class="tui-date-wrap"></div>
                                </div>
                            </div>
                            <div class="input-group search">
                                <label for="store-code" class="input-group-label">요청자</label>
                                <input type="text" class="input-md" placeholder="사용자 ID">
                            </div>
                        </div>
                        <div class="input-group-wrap">
                            <div class="input-group">
                                <label for="datepicker-input" class="input-group-label">처리일자</label>
                                <div class="input-datepicker-wrap">
                                    <div class="tui-datepicker-input tui-datetime-input">
                                        <input type="text" id="datepicker-input" class="input-md" value="2024-07-25" readonly>
                                    </div>
                                    <div id="tui-date-wrap" class="tui-date-wrap"></div>
                                </div>
                            </div>
                            <div class="input-group search">
                                <label for="store-code" class="input-group-label">처리자</label>
                                <input type="text" class="input-md" value="사용자 ID" readonly>
                            </div>
                        </div>
                        <div class="input-group-wrap">
                            <div class="input-group textarea">
                                <p class="label-text">비고</p>
                                <textarea name="" id="" placeholder="메모를 입력하세요."></textarea>
                            </div>
                        </div>
                        

                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button" class="btn btn-md btn-text ui-close-pop grow1"><span>취소</span></button>
                            <button type="button" class="btn btn-md btn-primary ui-close-pop grow1"><span>적용하기</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->



    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>
    <script>

    </script>
</body>

</html>
