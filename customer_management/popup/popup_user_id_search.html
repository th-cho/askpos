<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 ID 검색</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 사용자 ID 검색 팝업 ========== -->
    <div class="layer-wrap" id="popup-sample-md" style="display: block;">
        <div class="layer-pop">
            <div class="layer-inner layer-md">
                <div class="layer-head">
                    <h4 class="layer-title">사용자 ID 검색</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="searchbar-wrap">
                            <div class="input-group search">
                                <input type="text" class="input-md" placeholder="admin">
                            </div>
                            <button class="btn btn-md btn-neutral refresh"><i class="ico_refresh"></i></button>
                        </div>
                        <div class="table-container">
                            <table class="table-basic size-md table-fixed2 table-selectable">
                                <!-- <colgroup>
                                    <col width="10%">
                                    <col width="30%">
                                    <col width="5%">
                                    <col width="5%">
                                    <col width="5%">
                                    <col width="10%">
                                    <col width="10%">
                                    <col width="10%">
                                </colgroup> -->

                                <thead>
                                    <tr>
                                        <th class="txt-center">사용자 ID</th>
                                        <th class="txt-center">사용자명</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>AIZ0001</td>
                                        <td>아쿠쉬네트코리아 타이틀리스트 라시따점</td>
                                    </tr>
                                    <tr>
                                        <td>AIZ0110</td>
                                        <td>시티투어밴</td>
                                    </tr>
                                    <tr>
                                        <td>BAZ0053</td>
                                        <td>Wilson 속초점</td>
                                    </tr>
                                    <tr>
                                        <td>BBZ0007</td>
                                        <td>Wilson 봉담점(위드올)</td>
                                    </tr>
                                    <tr>
                                        <td>BBZ0009</td>
                                        <td>FZ 위드올 본점</td>
                                    </tr>
                                    <tr>
                                        <td>BBZ0012</td>
                                        <td>죽전점</td>
                                    </tr>
                                    <tr>
                                        <td>BBZ0037</td>
                                        <td>안산점</td>
                                    </tr>
                                    <tr>
                                        <td>BBZ0054</td>
                                        <td>Wilson 덕소삼패점(위드올)</td>
                                    </tr>
                                    <tr>
                                        <td>BBZ0056</td>
                                        <td>Wilson 수원점</td>
                                    </tr>
                                    <tr>
                                        <td>AIZ0001</td>
                                        <td>일산점3</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button" class="btn btn-md btn-text ui-close-pop"><span>취소</span></button>
                            <button type="button" class="btn btn-md btn-primary ui-close-pop"><span>적용하기</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->

    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>
