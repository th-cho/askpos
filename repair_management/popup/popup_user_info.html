<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수리등록(CBC)_접수자</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 수리_사용자정보 팝업 ========== -->
    <div class="layer-wrap" id="popup-sample-lg" style="display: block;">
        <div class="layer-pop">
            <div class="layer-inner layer-lg">
                <div class="layer-head with-btn">
                    <h4 class="layer-title">사용자정보</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="searchbar-wrap">
                            <div class="input-group search">
                                <input type="text" class="input-md" placeholder="사용자ID/명">
                            </div>
                            <div class="input-group select">
                                <select>
                                    <option value="">사용자구분</option>
                                </select>
                            </div>
                            <div class="input-group select">
                                <select>
                                    <option value="">부서코드</option>
                                </select>
                            </div>
                            <button class="btn btn-md btn-neutral refresh"><i class="ico_refresh"></i></button>
                        </div>
                        <div class="table-container">
                            <table class="table-basic size-md table-fixed2 table-selectable">
                                <colgroup>
                                    <!-- <col width="10%">
                                    <col width="30%">
                                    <col width="5%">
                                    <col width="5%">
                                    <col width="5%">
                                    <col width="10%">
                                    <col width="10%">
                                    <col width="10%">  -->
                                </colgroup>
    
                                <thead>
                                    <tr>
                                        <th>사용자ID</th>
                                        <th>사용자명</th>
                                        <th>사용자구분</th>
                                        <th>부서코드</th>
                                        <th>부서명</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>AIZ0001</td>
                                        <td>아쿠쉬네트코리아 타이틀리스트 라시따점</td>
                                        <td>90 (매장)</td>
                                        <td>T</td>
                                        <td>Salomon</td>
                                    </tr>
                                    <tr>
                                        <td>AIZ0000</td>
                                        <td>시티투어밴</td>
                                        <td>90 (매장)</td>
                                        <td>T</td>
                                        <td>Salomon</td>
                                    </tr>
                                    <tr>
                                        <td>820101</td>
                                        <td>Wilson 속초점</td>
                                        <td>90 (매장)</td>
                                        <td>T</td>
                                        <td>FOOTJOY</td>
                                    </tr>
                                    <tr>
                                        <td>820103</td>
                                        <td>Wilson 봉담점(위드올)</td>
                                        <td>90 (매장)</td>
                                        <td>T</td>
                                        <td>FOOTJOY</td>
                                    </tr>
                                    <tr>
                                        <td>820104</td>
                                        <td>Wilson 위드올 본점</td>
                                        <td>90 (매장)</td>
                                        <td>T</td>
                                        <td>FOOTJOY</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button" class="btn btn-md btn-text ui-close-pop"><span>취소</span></button>
                            <button type="button" class="btn btn-md btn-primary ui-close-pop"><span>적용하기</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->



    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>
</body>

</html>
