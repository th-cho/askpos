<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실사일자</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 실사일자 팝업 ========== -->
    <div class="layer-wrap" id="popup-sample-md" style="display:block;">
        <div class="layer-pop">
            <div class="layer-inner layer-md">
                <div class="layer-head with-btn">
                    <h4 class="layer-title">실사일자</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="searchbar-wrap">
                            <div class="input-group search">
                                <input type="text" class="input-md" placeholder="실사일자">
                            </div>
                            <button class="btn btn-md btn-neutral refresh"><i class="ico_refresh"></i></button>
                        </div>
                        <div class="table-container">
                            <table class="table-basic size-md table-fixed2 table-selectable">
                                <!-- <colgroup>
                                    <col width="30%">
                                    <col width="70%">
                                </colgroup> -->

                                <thead>
                                    <tr>
                                        <th>실사일자</th>
                                        <th>매장명</th>
                                        <th>실사구분</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>2024-07-24</td>
                                        <td>현대프리미엄아울렛 송도점</td>
                                        <td>실사</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button"
                                class="btn btn-md btn-text ui-close-pop grow1"><span>취소</span></button>
                            <button type="button"
                                class="btn btn-md btn-primary ui-close-pop grow1"><span>적용하기</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->



    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>



</body>

</html>
