<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매장설정2</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 매장 설정 팝업3 ========== -->
    <div class="layer-wrap" id="popup-sample-sm" style="display: block;">
        <div class="layer-pop">
            <div class="layer-inner">
                <div class="layer-head">
                    <h4 class="layer-title">매장 설정</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="input-group">
                            <label for="payment-amount" class="input-group-label">판매일자</label>
                            <div class="input-datepicker-wrap">
                                <div class="tui-datepicker-input tui-datetime-input">
                                    <input type="text" id="datepicker-input" class="input-md">
                                </div>
                                <div id="tui-date-wrap" class="tui-date-wrap"></div>
                            </div>
                        </div>
                        <div class="input-group search">
                            <label for="payment-amount" class="input-group-label">매장 코드</label>
                            <input type="text" class="input-md" placeholder="매장명, 매장코드 검색" value="롯데 프리미엄아울렛 기흥점(직영)">
                        </div>
                      
                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button" class="btn btn-md btn-text ui-close-pop"><span>취소</span></button>
                            <button type="button" class="btn btn-md btn-primary ui-close-pop"><span>적용</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->


    
    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>
    <script>
 
    </script>
</body>

</html>
