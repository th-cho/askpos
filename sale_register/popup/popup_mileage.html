<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마일리지</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 마일리지 팝업 ========== -->
    <div class="layer-wrap" id="popup-sample-sm" style="display: block;;">
        <div class="layer-pop">
            <div class="layer-inner">
                <div class="layer-head">
                    <h4 class="layer-title">마일리지</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="input-group">
                            <label for="payment-amount" class="input-group-label">결제금액</label>
                            <input type="text" class="input-md txt-align-right" id="payment-amount"  value="318,000">
                        </div>
                        <div class="input-group">
                            <label for="available-mileage" class="input-group-label">가용 마일리지</label>
                            <input type="text" class="input-md txt-align-right" id="available-mileage"  value="30,000" readonly>
                        </div>
                        <div class="input-group">
                            <label for="use-mileage" class="input-group-label txt-error">사용 마일리지</label>
                            <input type="text" class="input-md txt-align-right" id="use-mileage"  value="-3,000" >
                        </div>
                        <div class="input-group">
                            <label for="remain-mileage" class="input-group-label">잔여 마일리지</label>
                            <input type="text" class="input-md txt-align-right" id="remain-mileage" value="27,000"  readonly>
                        </div>
                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button" class="btn btn-md btn-text ui-close-pop"><span>취소</span></button>
                            <button type="button" class="btn btn-md btn-primary ui-close-pop"><span>사용하기</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->


    
    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>
    <script>
 
    </script>
</body>

</html>
