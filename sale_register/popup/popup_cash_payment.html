<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현금 결제</title>
    <link rel="stylesheet" href="../../assets/lib/tui-date-picker.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/guide.css">
    <link rel="stylesheet" href="../../assets/css/popup.css">
</head>

<body>
    <!-- ========== 현금 결제 팝업 ========== -->
    <div class="layer-wrap" id="popup-sample-sm" style="display: block;;">
        <div class="layer-pop">
            <div class="layer-inner">
                <div class="layer-head">
                    <h4 class="layer-title">현금 결제</h4>
                </div><!--// layer-head  -->
                <div class="layer-body">
                    <div class="layer-content">
                        <div class="input-group">
                            <label for="payment-amount" class="input-group-label">결제금액</label>
                            <input type="text" class="input-md txt-align-right" id="payment-amount"  value="318,000">
                        </div>
                        <div class="input-group">
                            <label for="receive-amount" class="input-group-label">받은금액</label>
                            <input type="text" class="input-md txt-align-right" id="receive-amount"  placeholder="받은 금액을 입력하세요">
                        </div>
                        <div class="input-group">
                            <label for="remain-amount" class="input-group-label">잔액</label>
                            <input type="text" class="input-md txt-align-right" id="remain-amount"  value="318,000" readonly>
                        </div>
                        <div class="input-group">
                            <label for="change-amount" class="input-group-label">거스름돈</label>
                            <input type="text" class="input-md txt-align-right" id="change-amount"  value="0" readonly>
                        </div>
                    </div><!--// layer-content -->
                    <div class="layer-bottom">
                        <div class="btn-area">
                            <button type="button" class="btn btn-md btn-text ui-close-pop"><span>취소</span></button>
                            <button type="button" class="btn btn-md btn-primary ui-close-pop"><span>결제하기</span></button>
                        </div>
                    </div><!--// layer-bottom  -->
                </div><!--// layer-body  -->
                <!-- <button type="button" class="btn-x-md2 ui-close-pop" title="닫기"><i class="ico-x-black"></i><span class="blind">닫기</span></button> -->
            </div>
        </div><!--// layer-pop  -->
    </div><!--// layer-pop-wrap #popup-sample -->


    
    <script src="../../assets/lib/tui-date-picker.min.js"></script>
    <script src="../../assets/js/index.js"></script>
    <script>
 
    </script>
</body>

</html>
